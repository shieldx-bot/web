apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-target-nginx
  namespace: backend
  labels:
    app: chaos-target-nginx
    chaos-target: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chaos-target-nginx
      chaos-target: "true"
  template:
    metadata:
      labels:
        app: chaos-target-nginx
        chaos-target: "true"
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: chaos-data
              mountPath: /mnt/chaos
      volumes:
        - name: chaos-data
          emptyDir: {}
